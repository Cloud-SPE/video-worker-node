syntax = "proto3";

package livepeer.registry.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/Cloud-SPE/livepeer-video-platform/apps/transcode-worker-node/proto/clients/livepeer/registry/v1;registryv1";

// ResolveMode mirrors types.ResolveMode in the Go layer. Frozen v1.
enum ResolveMode {
  RESOLVE_MODE_UNSPECIFIED = 0;
  RESOLVE_MODE_WELL_KNOWN  = 1;
  RESOLVE_MODE_CSV         = 2;
  RESOLVE_MODE_LEGACY      = 3;
}

// SignatureStatus mirrors types.SignatureStatus.
enum SignatureStatus {
  SIGNATURE_STATUS_UNSPECIFIED = 0;
  SIGNATURE_STATUS_VERIFIED    = 1;
  SIGNATURE_STATUS_UNSIGNED    = 2;
  SIGNATURE_STATUS_LEGACY      = 3;
}

// FreshnessStatus mirrors types.FreshnessStatus.
enum FreshnessStatus {
  FRESHNESS_UNSPECIFIED      = 0;
  FRESHNESS_FRESH            = 1;
  FRESHNESS_STALE_RECOVERABLE = 2;
  FRESHNESS_STALE_FAILING    = 3;
}

// Source mirrors types.Source.
enum Source {
  SOURCE_UNSPECIFIED      = 0;
  SOURCE_MANIFEST         = 1;
  SOURCE_LEGACY           = 2;
  SOURCE_STATIC_OVERLAY   = 3;
  SOURCE_CSV_FALLBACK     = 4;
}

// Capability is one named operation a node advertises. The name is
// opaque to the registry; consumers interpret it.
message Capability {
  string             name      = 1;
  string             work_unit = 2;
  repeated Model     models    = 3;
  bytes              extra_json = 4;  // arbitrary JSON, opaque
}

message Model {
  string                  id                       = 1;
  string                  price_per_work_unit_wei  = 2;  // decimal big-int as string
  bool                    warm                     = 3;
  bytes                   constraints_json         = 4;  // arbitrary JSON, opaque
}

// Node is one orchestrator endpoint with resolver-attached metadata.
message Node {
  string                id                = 1;
  string                url               = 2;
  double                lat               = 3;
  double                lon               = 4;
  string                region            = 5;
  repeated Capability   capabilities      = 6;
  Source                source            = 7;
  SignatureStatus       signature_status  = 8;
  string                operator_address  = 9;   // 0x-prefixed lower-case
  bool                  enabled           = 10;
  repeated string       tier_allowed      = 11;
  int32                 weight            = 12;
}
