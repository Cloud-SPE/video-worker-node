name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: build
        run: make build

      # NOTE: `make test-race` reproduces a pre-existing data race in
      # internal/runtime/metrics — see docs/exec-plans/tech-debt-tracker.md.
      # CI runs the non-race suite for now; flip to test-race once the
      # race is fixed.
      - name: test
        run: make test

      - name: coverage gate (>= 75% per package via lint/coverage-gate)
        run: make coverage-check

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.out
